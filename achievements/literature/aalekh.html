<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | Namit Shastry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #040812;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ===== BACKGROUND SYSTEM ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(180deg, rgba(4, 8, 18, 0.85) 0%, rgba(11, 21, 40, 0.9) 100%), 
                        url('city-bg.png') no-repeat center center;
            background-size: cover;
        }

        /* ===== NAVIGATION BAR ===== */
        .top-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 20px;
            gap: 30px;
            z-index: 10;
        }

        .top-nav a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .top-nav a:hover, .top-nav a.active {
            color: #f5c542;
            text-shadow: 0 0 10px rgba(245, 197, 66, 0.5);
        }

        /* ===== MAIN WORKSPACE CONTROLLER ===== */
        .content-container {
            max-width: 1100px;
            width: 100%;
            margin: auto;
            padding: 20px 40px 60px;
            flex: 1;
        }

        /* HERO BANNER FOR AALEKH AWARD */
        .award-hero-banner {
            width: 100%;
            height: 360px;
            border-radius: 24px;
            border: 2px solid #f5c542;
            box-shadow: 0 0 35px rgba(245, 197, 66, 0.3);
            overflow: hidden;
            background-color: #0c1424;
            margin-bottom: 40px;
            position: relative;
        }

        .award-hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 46px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 50%, #f5c542 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .gold-divider {
            width: 60px;
            height: 2px;
            background: #f5c542;
            box-shadow: 0 0 8px #f5c542;
            margin-bottom: 30px;
        }

        /* ACCOMPLISHMENTS DISPLAY GLASS CARD */
        .achievement-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .achievement-item-card {
            background: rgba(255, 245, 220, 0.02);
            border: 1px solid rgba(245, 197, 66, 0.15);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            gap: 25px;
            align-items: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .achievement-item-card:hover {
            transform: translateY(-3px);
            border-color: #f5c542;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .achievement-icon-box {
            font-size: 36px;
            color: #f5c542;
            text-shadow: 0 0 10px rgba(245, 197, 66, 0.4);
        }

        .achievement-details h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .achievement-details p {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="index.html">About</a>
        <a href="research.html">Research</a>
        <a href="chess.html">Chess</a>
        <a href="articles.html">Articles</a>
        <a href="achievements.html" class="active">Achievements</a>
        <a href="leadership.html">Leadership</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="content-container">
        
        <header class="award-hero-banner">
            <img src="aalekh-award.png" alt="Aalekh Literature Award Display">
        </header>

        <h1 class="page-title">Honors & Achievements</h1>
        <div class="gold-divider"></div>

        <section class="achievement-feed">
            <div class="achievement-item-card">
                <div class="achievement-icon-box">
                    <i class="fa-solid fa-award"></i>
                </div>
                <div class="achievement-details">
                    <h2>Aalekh Literature Award</h2>
                    <p>Recognized for outstanding contributions and creative excellence in literary arts and writing showcase fields.</p>
                </div>
            </div>
        </section>

    </main>

</body>
</html>

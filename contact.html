<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Namit Shastry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">

    <style>
        /* ===== CORE BRAND PRESETS ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #0e171e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== SYNAPSE AMBIENT BACKDROP ===== */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0b1116 0%, #121e24 100%);
        }

        .bg-blobs::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 65vw;
            height: 65vw;
            background: radial-gradient(circle, rgba(78, 142, 147, 0.45) 0%, rgba(39, 76, 85, 0) 70%);
            border-radius: 43% 57% 62% 38% / 45% 40% 60% 55%;
            filter: blur(70px);
            animation: wave-movement 20s infinite alternate ease-in-out;
        }

        .bg-blobs::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(53, 99, 101, 0.4) 0%, rgba(14, 23, 30, 0) 70%);
            border-radius: 50% 40% 55% 45% / 40% 60% 40% 60%;
            filter: blur(80px);
            animation: wave-movement 16s infinite alternate-reverse ease-in-out;
        }

        /* ===== CONTRAST WATERMARK CHESS PIECES ===== */
        .chess-watermark {
            position: absolute;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }
        .wm-knight-left { left: 8%; top: 25%; width: 120px; }
        .wm-pawn-left { left: 10%; bottom: 20%; width: 100px; }
        .wm-king-right { right: 8%; top: 20%; width: 130px; }
        .wm-rook-right { right: 10%; bottom: 22%; width: 110px; }

        /* ===== FLEXIBLE STRUCTURAL WRAPPER ===== */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* ===== SYSTEM BACK NAVIGATION ARROW ===== */
        .back-button-wrapper {
            position: absolute;
            top: -70px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeInDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .back-arrow-btn {
            background: none;
            border: none;
            color: #8dbdc1;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(141, 189, 193, 0.15);
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-arrow-btn:hover {
            color: #ffffff;
            border-color: rgba(141, 189, 193, 0.4);
            background: rgba(141, 189, 193, 0.08);
            transform: translateX(-3px);
        }

        .back-text {
            font-size: 14px;
            color: #8dbdc1;
            opacity: 0.8;
            font-weight: 400;
        }

        /* ===== GLASSMORPHISM PROFILE UNIT ===== */
        .contact-card {
            width: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(141, 189, 193, 0.18);
            border-radius: 24px;
            padding: 40px 35px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            margin-bottom: 20px;
        }

        .profile-initial {
            width: 78px;
            height: 78px;
            background: linear-gradient(135deg, #5fc3bc 0%, #284c4e 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(78, 142, 147, 0.3), inset 0 1px 2px rgba(255,255,255,0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 30%, #c4dedf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8dbdc1;
            margin-bottom: 35px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            opacity: 0.85;
        }

        /* ===== DATA LIST GROUPS ===== */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(141, 189, 193, 0.02) 0%, rgba(141, 189, 193, 0.00) 100%);
            border: 1px solid rgba(141, 189, 193, 0.08);
            padding: 16px 20px;
            border-radius: 14px;
            color: #dae5e6;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
        }

        .info-content {
            display: flex;
            align-items: center;
        }

        .info-item:hover {
            background: linear-gradient(90deg, rgba(141, 189, 193, 0.07) 0%, rgba(141, 189, 193, 0.02) 100%);
            border-color: rgba(141, 189, 193, 0.3);
            transform: translateY(-2px);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(78, 142, 147, 0.08);
        }

        .icon {
            font-size: 16px;
            margin-right: 16px;
            color: #8dbdc1;
            display: flex;
            align-items: center;
        }

        .val {
            font-size: 14.5px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .action-icon {
            opacity: 0.4;
            transition: opacity 0.3s ease;
            color: #8dbdc1;
            display: flex;
            align-items: center;
        }

        .info-item:hover .action-icon {
            opacity: 0.9;
        }

        /* ===== PROFILE SOCIAL INTERACTIVE DOCK ===== */
        .social-dock {
            width: 100%;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(141, 189, 193, 0.12);
            border-radius: 20px;
            padding: 16px 30px;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            gap: 30px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .dock-link {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(141, 189, 193, 0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: #8dbdc1;
            text-decoration: none;
        }

        /* Platform Custom Hover Glows */
        .dock-link.chess-com:hover {
            background: rgba(129, 182, 76, 0.15);
            border-color: #81b64c;
            color: #81b64c;
            box-shadow: 0 0 20px rgba(129, 182, 76, 0.3);
            transform: translateY(-4px);
        }

        .dock-link.lichess:hover {
            background: rgba(213, 163, 62, 0.15);
            border-color: #d5a33e;
            color: #d5a33e;
            box-shadow: 0 0 20px rgba(213, 163, 62, 0.3);
            transform: translateY(-4px);
        }

        .dock-link.linkedin:hover {
            background: rgba(10, 102, 194, 0.15);
            border-color: #0a66c2;
            color: #0a66c2;
            box-shadow: 0 0 20px rgba(10, 102, 194, 0.3);
            transform: translateY(-4px);
        }

        .dock-link svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ===== TOOLTIP RECOGNITION ===== */
        .tooltip {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #16262e;
            color: #4ecdc4;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(78, 142, 147, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-weight: 500;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes wave-movement {
            0% { border-radius: 43% 57% 62% 38% / 45% 40% 60% 55%; transform: translate(0, 0) rotate(0deg); }
            50% { border-radius: 60% 40% 45% 55% / 50% 55% 45% 50%; transform: translate(-15px, 10px) rotate(30deg); }
            100% { border-radius: 40% 60% 50% 50% / 40% 45% 55% 60%; transform: translate(10px, -5px) rotate(60deg); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<script>
    function copyData(text, element) {
        const cleanText = text.replace('+91 ', '');
        navigator.clipboard.writeText(cleanText).then(() => {
            const tooltip = element.querySelector('.tooltip');
            tooltip.style.opacity = "1";
            
            setTimeout(() => {
                tooltip.style.opacity = "0";
            }, 1200);
        });
    }
</script>

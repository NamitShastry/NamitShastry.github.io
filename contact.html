<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Namit Shastry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">

    <style>
        /* ===== CORE BRAND PRESETS ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #0e171e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== SYNAPSE AMBIENT BACKDROP ===== */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0b1116 0%, #121e24 100%);
        }

        .bg-blobs::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 65vw;
            height: 65vw;
            background: radial-gradient(circle, rgba(78, 142, 147, 0.45) 0%, rgba(39, 76, 85, 0) 70%);
            border-radius: 43% 57% 62% 38% / 45% 40% 60% 55%;
            filter: blur(70px);
            animation: wave-movement 20s infinite alternate ease-in-out;
        }

        .bg-blobs::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(53, 99, 101, 0.4) 0%, rgba(14, 23, 30, 0) 70%);
            border-radius: 50% 40% 55% 45% / 40% 60% 40% 60%;
            filter: blur(80px);
            animation: wave-movement 16s infinite alternate-reverse ease-in-out;
        }

        /* ===== FLEXIBLE STRUCTURAL WRAPPER ===== */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* ===== SYSTEM BACK NAVIGATION ARROW ===== */
        .back-button-wrapper {
            align-self: center;
            margin-bottom: 24px;
            animation: fadeInDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .back-arrow-btn {
            background: none;
            border: none;
            color: #8dbdc1;
            font-size: 24px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(141, 189, 193, 0.15);
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-arrow-btn:hover {
            color: #ffffff;
            border-color: rgba(141, 189, 193, 0.4);
            background: rgba(141, 189, 193, 0.08);
            transform: translateY(-2px);
        }

        /* ===== GLASSMORPHISM PROFILE UNIT ===== */
        .contact-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(141, 189, 193, 0.15);
            border-radius: 24px;
            padding: 40px 35px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .profile-initial {
            width: 74px;
            height: 74px;
            background: linear-gradient(135deg, #4ecdc4 0%, #356365 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(78, 142, 147, 0.25);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 30%, #c4dedf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #8dbdc1;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* ===== DATA LIST GROUPS ===== */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .info-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(141, 189, 193, 0.06);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #dae5e6;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .info-item:hover {
            background: rgba(141, 189, 193, 0.05);
            border-color: rgba(141, 189, 193, 0.25);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .icon {
            font-size: 16px;
            margin-right: 16px;
            color: #8dbdc1;
        }

        .val {
            font-size: 15px;
            font-weight: 400;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes wave-movement {
            0% { border-radius: 43% 57% 62% 38% / 45% 40% 60% 55%; transform: translate(0, 0) rotate(0deg); }
            50% { border-radius: 60% 40% 45% 55% / 50% 55% 45% 50%; transform: translate(-15px, 10px) rotate(30deg); }
            100% { border-radius: 40% 60% 50% 50% / 40% 45% 55% 60%; transform: translate(10px, -5px) rotate(60deg); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-blobs"></div>

<div class="container">

    <div class="back-button-wrapper">
        <button onclick="history.back()" class="back-arrow-btn" aria-label="Go Back">←</button>
    </div>

    <div class="contact-card">
        <div class="profile-initial">NS</div>
        <h1>Namit Shastry</h1>
        <div class="subtitle">Get In Touch</div>

        <div class="info-list">
            <div class="info-item" onclick="copyData('namitshastry@gmail.com', this)">
                <span class="icon">✉</span>
                <span class="val">namitshastry@gmail.com</span>
            </div>

            <div class="info-item" onclick="copyData('+91 9819580472', this)">
                <span class="icon">📞</span>
                <span class="val">+91 9819580472</span>
            </div>
        </div>
    </div>

</div>

<script>
    function copyData(text, element) {
        navigator.clipboard.writeText(text.replace('+91 ', '')).then(() => {
            const textNode = element.querySelector('.val');
            const originalText = textNode.innerText;
            
            textNode.innerText = "Copied to Clipboard!";
            textNode.style.color = "#4ecdc4";
            
            setTimeout(() => {
                textNode.innerText = originalText;
                textNode.style.color = "";
            }, 1200);
        });
    }
</script>

</body>
</html>

    function copyData(text, element) {
        navigator.clipboard.writeText(text.replace('+91 ', '')).then(() => {
            const originalText = element.style.getPropertyValue('--tooltip') || 'Click to copy';
            
            // Temporary dynamic response on success copy hook
            element.setAttribute('style', '--tooltip: "Copied!"');
            
            // Create an alternative style change for visual pop feedback

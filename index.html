<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namit Shastry | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===== SYSTEM RESET & BASICS ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050910;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ===== BACKGROUND MESH EFFECTS ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 30% 20%, rgba(245, 197, 66, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(78, 142, 147, 0.12) 0%, transparent 50%),
                        linear-gradient(180deg, #05080c 0%, #0c1420 100%);
            background-size: cover;
        }

        .bg-canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
        }

        /* ===== NAV BAR ===== */
        .top-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 20px;
            gap: 30px;
            z-index: 10;
            background: linear-gradient(180deg, rgba(5,8,12,0.6) 0%, transparent 100%);
        }

        .top-nav a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .top-nav a:hover, .top-nav a.active {
            color: #f5c542;
            text-shadow: 0 0 12px rgba(245, 197, 66, 0.4);
        }

        /* ===== LAYOUT CONTAINER ===== */
        .main-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: auto;
            padding: 20px 40px 60px;
            display: grid;
            grid-template-columns: 1.1fr 1.3fr;
            gap: 60px;
            align-items: center;
            flex: 1;
        }

        /* ===== LEFT COLUMN: PROFILE CARD ===== */
        .hero-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Premium Gold Glowing Frame */
        .photo-frame {
            width: 360px;
            height: 460px;
            border-radius: 24px;
            border: 2px solid rgba(245, 197, 66, 0.35);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 30px rgba(245, 197, 66, 0.08),
                        inset 0 0 20px rgba(245, 197, 66, 0.1);
            background: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.05) 100%);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        .photo-frame:hover {
            transform: translateY(-5px);
            border-color: rgba(245, 197, 66, 0.7);
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6),
                        0 0 40px rgba(245, 197, 66, 0.15);
        }

        /* Automatic centering and resizing framework for profile picture file */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .hero-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 40%, #f5c542 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero-left .gold-divider {
            width: 40px;
            height: 2px;
            background: #f5c542;
            margin: 8px auto 16px;
            border-radius: 2px;
            box-shadow: 0 0 8px #f5c542;
        }

        .hero-left p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        /* ===== RIGHT COLUMN: LINK MODULES ===== */
        .dashboard-right {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dashboard-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 22px 30px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dashboard-card:hover {
            transform: translateX(8px);
            background: linear-gradient(90deg, rgba(245, 197, 66, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            border-color: rgba(245, 197, 66, 0.25);
            box-shadow: inset 0 0 15px rgba(245, 197, 66, 0.03);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 22px;
            position: relative;
            z-index: 2;
        }

        .card-meta i {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.4);
            width: 30px;
            text-align: center;
            transition: color 0.3s ease;
        }

        .dashboard-card:hover .card-meta i {
            color: #f5c542;
        }

        .card-meta span {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        .dashboard-card:hover .card-meta span {
            color: #ffffff;
        }

        /* ===== GRAPHIC WATERMARKS ===== */
        .card-backdrop-graphic {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            height: 85%;
            width: auto;
            opacity: 0.06;
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            z-index: 1;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .card-backdrop-graphic i {
            font-size: 52px;
        }

        .dashboard-card:hover .card-backdrop-graphic {
            opacity: 0.15;
            transform: translateY(-50%) scale(1.08);
        }

        /* Chessboard overlay system block pattern */
        .chess-pattern-grid {
            display: grid;
            grid-template-columns: repeat(4, 15px);
            grid-template-rows: repeat(2, 15px);
            gap: 0;
            opacity: 0.8;
        }
        .chess-pattern-grid div {
            width: 15px;
            height: 15px;
        }
        .chess-pattern-grid div:nth-child(odd) { background-color: #ffffff; }

        /* ===== RESPONSIVE MEDIA QUERIES ===== */
        @media (max-width: 1024px) {
            .main-wrapper {
                grid-template-columns: 1fr;
                gap: 50px;
                padding-top: 10px;
            }
            .hero-left {
                margin-bottom: 10px;
            }
            .photo-frame {
                width: 320px;
                height: 410px;
            }
        }

        @media (max-width: 600px) {
            .top-nav {
                gap: 15px;
                flex-wrap: wrap;
                padding: 15px 10px;
            }
            .top-nav a { font-size: 12px; }
            .hero-left h1 { font-size: 38px; }
            .hero-left p { font-size: 15px; }
            .photo-frame { width: 260px; height: 340px; }
            .dashboard-card { padding: 16px 20px; }
            .card-meta span { font-size: 15px; }
            .card-backdrop-graphic i { font-size: 38px; }
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <nav class="top-nav">
        <a href="index.html" class="active">Home</a>
        <a href="index.html">About</a>
        <a href="research.html">Research</a>
        <a href="chess.html">Chess</a>
        <a href="articles.html">Articles</a>
        <a href="achievements.html">Achievements</a>
        <a href="leadership.html">Leadership</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="main-wrapper">
        
        <section class="hero-left">
            <div class="photo-frame">
                <img src="profile.jpg" alt="Namit Shastry">
            </div>
            
            <h1>Namit Shastry</h1>
            <div class="gold-divider"></div>
            <p>B.Tech, Civil Engineering,<br>MNIT Jaipur.</p>
        </section>

        <section class="dashboard-right">
            
            <a href="index.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-regular fa-user"></i>
                    <span>About Me</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
            </a>

            <a href="research.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>Research</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
            </a>

            <a href="chess.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-chess-knight"></i>
                    <span>Chess</span>
                </div>
                <div class="card-backdrop-graphic">
                    <div class="chess-pattern-grid">
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                    </div>
                </div>
            </a>

            <a href="articles.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <span>Articles</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-book-open"></i>
                </div>
            </a>

            <a href="achievements.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-regular fa-trophy"></i>
                    <span>Achievements</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-trophy"></i>
                </div>
            </a>

            <a href="leadership.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-users"></i>
                    <span>Leadership</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-users-viewfinder"></i>
                </div>
            </a>

            <a href="contact.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-phone"></i>
                    <span>Contact</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-phone-flip"></i>
                </div>
            </a>

        </section>

    </main>

</body>
</html>

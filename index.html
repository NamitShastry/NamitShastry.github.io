<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namit Shastry | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #040812;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ===== BACKGROUND SYSTEM ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(180deg, rgba(4, 8, 18, 0.82) 0%, rgba(11, 21, 40, 0.88) 100%), 
                        url('city-bg.png') no-repeat center center;
            background-size: cover;
        }

        /* ===== NAVIGATION ===== */
        .top-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 20px;
            gap: 30px;
            z-index: 10;
        }

        .top-nav a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .top-nav a:hover, .top-nav a.active {
            color: #f5c542;
            text-shadow: 0 0 10px rgba(245, 197, 66, 0.5);
        }

        /* ===== LAYOUT ===== */
        .main-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: auto;
            padding: 20px 40px 60px;
            display: grid;
            grid-template-columns: 1.1fr 1.3fr;
            gap: 60px;
            align-items: center;
            flex: 1;
        }

        .hero-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* FIX 1: FIXED HAIR PHOTO FRAME */
        .photo-frame {
            width: 340px;
            height: 440px;
            border-radius: 24px;
            border: 2px solid #f5c542;
            box-shadow: 0 0 30px rgba(245, 197, 66, 0.4),
                        inset 0 0 20px rgba(245, 197, 66, 0.2);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            background-color: #0c1424; /* Prevents white spaces on borders */
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* FIX: Shows entire photo, stops cutting hair short */
            background-color: #0c1424;
        }

        .hero-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 50%, #f5c542 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero-left .gold-divider {
            width: 50px;
            height: 2px;
            background: #f5c542;
            margin: 8px auto 16px;
            box-shadow: 0 0 10px #f5c542;
        }

        .hero-left p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 300;
            line-height: 1.6;
        }

        /* ===== FIX 2: VIBRANT GLOWING COMPONENT LINKS ===== */
        .dashboard-right {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dashboard-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 245, 220, 0.03);
            border: 1px solid rgba(245, 197, 66, 0.2); /* Golden structural frames */
            border-radius: 14px;
            padding: 20px 30px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 0 15px rgba(245, 197, 66, 0.02);
        }

        .dashboard-card:hover {
            transform: translateX(10px);
            background: rgba(245, 197, 66, 0.07);
            border-color: #f5c542;
            box-shadow: 0 0 25px rgba(245, 197, 66, 0.25),
                        inset 0 0 20px rgba(245, 197, 66, 0.1);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .card-meta i {
            font-size: 22px;
            color: #f5c542; /* Premium Gold Icons */
            text-shadow: 0 0 8px rgba(245, 197, 66, 0.5);
            width: 30px;
            text-align: center;
        }

        .card-meta span {
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* RIGHT-SIDE CONTENT BACKGROUND GRAPHICS */
        .card-backdrop-graphic {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.25; /* Highly visible */
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 1;
            color: #f5c542; /* Matching the custom sample colors */
        }

        .dashboard-card:hover .card-backdrop-graphic {
            opacity: 0.6;
            transform: translateY(-50%) scale(1.1);
        }

        /* CHESSBOARD GRAPHIC LAYOUT ENGINE */
        .chess-board-mini {
            display: grid;
            grid-template-columns: repeat(4, 12px);
            grid-template-rows: repeat(3, 12px);
            gap: 1px;
            border: 1px solid rgba(245, 197, 66, 0.4);
            padding: 1px;
            background-color: rgba(0,0,0,0.5);
        }
        .chess-board-mini div {
            width: 12px;
            height: 12px;
        }
        .chess-board-mini div:nth-child(even) {
            background-color: #f5c542;
        }

        /* BOOK/TROPHY CARD GLOW SIZES */
        .card-backdrop-graphic i {
            font-size: 36px;
            filter: drop-shadow(0 0 8px rgba(245, 197, 66, 0.4));
        }

        @media (max-width: 1024px) {
            .main-wrapper { grid-template-columns: 1fr; gap: 40px; }
            .photo-frame { width: 300px; height: 400px; }
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <nav class="top-nav">
        <a href="index.html" class="active">Home</a>
       <a href="about.html">About</a>
        <a href="research.html">Research</a>
        <a href="chess.html">Chess</a>
        <a href="articles.html">Articles</a>
        <a href="achievements.html">Achievements</a>
        <a href="leadership.html">Leadership</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="main-wrapper">
        
        <section class="hero-left">
            <div class="photo-frame">
                <img src="profile.jpg" alt="Namit Shastry">
            </div>
            
            <h1>Namit Shastry</h1>
            <div class="gold-divider"></div>
            <p>B.Tech, Civil Engineering,<br>MNIT Jaipur.</p>
        </section>

        <section class="dashboard-right">
            
            <a href="index.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-regular fa-user"></i>
                    <span>About Me</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
            </a>

            <a href="research.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>Research</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
            </a>

            <a href="chess.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-chess-knight"></i>
                    <span>Chess</span>
                </div>
                <div class="card-backdrop-graphic">
                    <div class="chess-board-mini">
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                    </div>
                </div>
            </a>

            <a href="articles.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <span>Articles</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-book-open"></i>
                </div>
            </a>

            <a href="achievements.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-regular fa-trophy"></i>
                    <span>Achievements</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-trophy"></i>
                </div>
            </a>

            <a href="leadership.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-users"></i>
                    <span>Leadership</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-users-viewfinder"></i>
                </div>
            </a>

            <a href="contact.html" class="dashboard-card">
                <div class="card-meta">
                    <i class="fa-solid fa-phone"></i>
                    <span>Contact</span>
                </div>
                <div class="card-backdrop-graphic">
                    <i class="fa-solid fa-phone-flip"></i>
                </div>
            </a>

        </section>

    </main>

</body>
</html>

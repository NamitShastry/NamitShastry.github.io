<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namit Shastry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,600;0,700;1,500&display=swap" rel="stylesheet">

    <style>
        /* ===== CORE BRAND PRESETS ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #0b0f12;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== PERSISTENT GLOBAL TOP NAV BAR ===== */
        .global-header {
            width: 100%;
            padding: 20px 0;
            background: rgba(11, 15, 18, 0.8);
            backdrop-filter: blur(12px);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .header-nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .header-link {
            color: #8da4a6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .header-link:hover, .header-link.active {
            color: #ffffff;
        }

        /* ===== MAIN DASHBOARD CONTAINER ===== */
        .main-hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px 20px;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #f7cb65; /* Vibrant Gold Accent */
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 15px;
            color: #a4b3b5;
            letter-spacing: 1px;
            margin-bottom: 48px;
        }

        /* ===== GRID TILES SYSTEM ===== */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 560px;
            margin: 0 auto;
        }

        /* Span the 7th item across both columns if layout is odd */
        .portal-grid .grid-btn:nth-child(7) {
            grid-column: span 2;
        }

        .grid-btn {
            background: #13191c;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 22px 20px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-btn:hover {
            background: #1b2327;
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* ===== RESPONSIVE TUNING ===== */
        @media (max-width: 576px) {
            h1 { font-size: 36px; }
            .portal-grid { grid-template-columns: 1fr; }
            .portal-grid .grid-btn:nth-child(7) { grid-column: span 1; }
            .header-nav { gap: 15px; flex-wrap: wrap; padding: 0 10px; }
        }
    </style>
</head>
<body>

    <header class="global-header">
        <nav class="header-nav">
            <a href="index.html" class="header-link active">Home</a>
            <a href="about.html" class="header-link">About</a>
            <a href="research.html" class="header-link">Research</a>
            <a href="chess.html" class="header-link">Chess</a>
            <a href="articles.html" class="header-link">Articles</a>
            <a href="achievements.html" class="header-link">Achievements</a>
            <a href="leadership.html" class="header-link">Leadership</a>
            <a href="contact.html" class="header-link">Contact</a>
        </nav>
    </header>

    <main class="main-hero">
        <div class="hero-content">
            <h1>Namit Shastry</h1>
            <div class="tagline">Research • Chess • Engineering • Writing</div>

            <div class="portal-grid">
                <a href="about.html" class="grid-btn">About Me</a>
                <a href="research.html" class="grid-btn">Research</a>
                <a href="chess.html" class="grid-btn">Chess</a>
                <a href="articles.html" class="grid-btn">Articles</a>
                <a href="achievements.html" class="grid-btn">Achievements</a>
                <a href="leadership.html" class="grid-btn">Leadership</a>
                <a href="contact.html" class="grid-btn">Contact</a>
            </div>
        </div>
    </main>

</body>
</html>
